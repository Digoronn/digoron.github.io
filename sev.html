<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barışalım mı? ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: background 1.8s ease;
    }

    .heart-bg {
      position: absolute;
      font-size: 620px;
      opacity: 0.13;
      color: #ff4d94;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      text-align: center;
      z-index: 2;
      padding: 20px;
    }

    h1 {
      font-size: 2.9rem;
      color: #fff;
      text-shadow: 0 4px 15px rgba(0,0,0,0.25);
      margin-bottom: 12px;
    }

    p {
      font-size: 1.55rem;
      color: #fff;
      margin-bottom: 45px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .buttons {
      display: flex;
      gap: 35px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 3;
    }

    button {
      padding: 18px 45px;
      font-size: 1.45rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    #yesBtn {
      background: #ff4d94;
      color: white;
      font-weight: 700;
    }

    #noBtn {
      background: #555;
      color: white;
      position: absolute;
      transition: left 0.4s ease, top 0.4s ease;
      z-index: 5;
    }

    .result {
      margin-top: 50px;
      display: none;
      flex-direction: column;
      align-items: center;
      z-index: 4;
    }

    .big-thanks {
      font-size: 2.85rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 6px 30px rgba(255, 77, 148, 0.9);
      line-height: 1.25;
      text-align: center;
    }

    body.yes-active {
      background: url('background.jpg') center/contain no-repeat fixed;
      background-color: #111;
    }

    .floating-hearts {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .heart {
      position: absolute;
      font-size: 32px;
      color: #ff4d94;
      opacity: 0.75;
      animation: float 8s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-140px) rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="heart-bg">❤️</div>
  <div class="floating-hearts" id="hearts"></div>

  <div class="container">
    <h1>Canım ❤️</h1>
    <p>Benimle barışır mısın?<br>Çok özledim seni...</p>
    <p style="font-size:1.25rem; opacity:0.9;">Üzgünüm, hata yaptım.</p>

    <div class="buttons">
      <button id="yesBtn">EVET, BARİŞALIM ❤️</button>
      <button id="noBtn">Hayır :(</button>
    </div>

    <div class="result" id="result">
      <div class="big-thanks">Teşekkür ederim,<br>seni çok seviyorum güzelimmm ❤️</div>
    </div>
  </div>

  <!-- Yerel Müzik Dosyası -->
  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const result = document.getElementById('result');
    const bgMusic = document.getElementById('bgMusic');
    let yesScale = 1;

    // Uçan kalpler
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.textContent = ['❤️','💗','💖','💘'][Math.floor(Math.random()*4)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 6 + 8) + 's';
      document.getElementById('hearts').appendChild(heart);
      setTimeout(() => heart.remove(), 17000);
    }
    setInterval(createHeart, 280);

    // ==================== DÜZELTİLMİŞ HAYIR TUŞU ====================
    function moveNoButton() {
      const padding = 160;
      const x = padding + Math.random() * (window.innerWidth - padding * 2);
      const y = padding + Math.random() * (window.innerHeight - padding * 2);

      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';

      yesScale += 0.13;
      yesBtn.style.transform = `scale(${yesScale})`;
    }

    // Fare yaklaştığında hareket etsin
    document.addEventListener('mousemove', (e) => {
      const rect = noBtn.getBoundingClientRect();
      const dist = Math.hypot(
        e.clientX - (rect.left + rect.width / 2),
        e.clientY - (rect.top + rect.height / 2)
      );

      if (dist < 190) {
        moveNoButton();
      }
    });

    // Tıklayınca da hareket etsin
    noBtn.addEventListener('click', moveNoButton);
    // =================================================================

    // EVET butonu
    yesBtn.addEventListener('click', () => {
      document.body.classList.add('yes-active');

      noBtn.style.display = 'none';           // Sadece burada kayboluyor
      document.querySelectorAll('h1, p').forEach(el => el.style.display = 'none');

      result.style.display = 'flex';

      yesBtn.style.transform = `scale(${yesScale + 0.4})`;
      yesBtn.textContent = "Seni çok seviyorum! ❤️";

      bgMusic.play();
    });
  </script>
</body>
</html>
